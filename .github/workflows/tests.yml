name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]   # يطابق requires-python >=3.10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: python -m pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check scripts tests

  corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      # فحص صحة المُدوَّنة المُلتزمة: يُفشل عند الأخطاء الصلبة (عناوين معطوبة،
      # ضجيج واجهة، فقرات مكرّرة، حقول ناقصة)؛ التحذيرات تُعرض ولا تُفشل
      - run: python -m scripts.lint_corpus laws --warnings
      # التأكد أن index.json محدَّث مع أي تغيير في laws/
      - run: python -m scripts.build_index laws --check
